<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>好好生醫</title>
  <style>
    :root {
      --color-brand-red:    #C8373A;
      --color-brand-white:  #FFFFFF;
      --color-brand-dark:   #1A1A1A;
      --color-black:        #111111;
      --color-gray-deep:    #2C2C2C;
      --color-gray-mid:     #6B6B6B;
      --color-gray-light:   #E8E8E8;
      --color-cta:          #C8373A;
      --color-cta-hover:    #A52D30;
      --glass-bg:           rgba(255, 255, 255, 0.18);
      --glass-border:       rgba(255, 255, 255, 0.35);
      --glass-shadow:       0 8px 32px rgba(31, 38, 135, 0.12);
      --glass-blur:         12px;
      --space-xs:   4px;
      --space-sm:   8px;
      --space-md:   16px;
      --space-lg:   24px;
      --space-xl:   40px;
      --ease-smooth:        cubic-bezier(0.4, 0, 0.2, 1);
      --ease-bounce:        cubic-bezier(0.34, 1.56, 0.64, 1);
      --duration-fast:      150ms;
      --duration-base:      250ms;
      --duration-slow:      400ms;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
    }

    .brand-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 15%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    @media (orientation: landscape) {
      .brand-image {
        object-position: center center;
      }
      .player-wrap-c {
        bottom: 12px;
      }
    }

    /* ── Version C: Minimal Play Button ── */
    .player-wrap-c {
      position: absolute;
      left: 50%;
      bottom: calc(32px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
      width: 96px;
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 旋轉外圈 */
    .player-wrap-c .vinyl-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(30,30,30,0.12);
      background: repeating-radial-gradient(
        circle at center,
        transparent 0px,
        transparent 8px,
        rgba(30,30,30,0.10) 8px,
        rgba(30,30,30,0.10) 9px
      );
      opacity: 0;
      transform: scale(0.6);
      transform-origin: center;
      transition:
        opacity 200ms ease-in,
        transform 200ms ease-in;
      pointer-events: none;
    }

    /* 播放中外圈 */
    .player-wrap-c.playing .vinyl-ring {
      opacity: 1;
      transform: scale(1);
      animation: ring-spin-c 4s linear infinite;
      transition:
        opacity 300ms var(--ease-bounce),
        transform 300ms var(--ease-bounce);
    }

    @keyframes ring-spin-c {
      from { transform: scale(1) rotate(0deg); }
      to   { transform: scale(1) rotate(360deg); }
    }

    /* 主鈕 */
    .player-btn-c {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.08);
      cursor: pointer;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow:
        0 2px 12px rgba(0,0,0,0.18),
        0 1px 4px rgba(0,0,0,0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      transition:
        transform var(--duration-fast) var(--ease-smooth),
        box-shadow var(--duration-base) var(--ease-smooth);
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .player-btn-c:focus-visible {
      outline: 2px solid #C8373A;
      outline-offset: 4px;
    }

    /* Icon */
    .player-btn-c .icon-play,
    .player-btn-c .icon-pause {
      position: absolute;
      transition: opacity var(--duration-base) var(--ease-smooth);
      color: #1A1A1A;
    }
    .player-btn-c .icon-play  { opacity: 1; }
    .player-btn-c .icon-pause { opacity: 0; }
    .player-wrap-c.playing .player-btn-c .icon-play  { opacity: 0; }
    .player-wrap-c.playing .player-btn-c .icon-pause { opacity: 1; }

    /* Hover */
    .player-btn-c:hover {
      transform: scale(1.06);
      box-shadow:
        0 4px 16px rgba(0,0,0,0.22),
        0 2px 6px rgba(0,0,0,0.14);
    }

    .player-btn-c:active {
      transform: scale(0.88);
      transition-duration: 100ms;
    }

    /* 響應式 */
    @media (min-width: 390px) {
      .player-btn-c {
        width: 64px;
        height: 64px;
      }
      .player-wrap-c {
        width: 108px;
        height: 108px;
      }
    }

    /* 320px 最小螢幕 */
    @media (max-width: 374px) {
      .player-btn-c {
        width: 48px;
        height: 48px;
      }
      .player-wrap-c {
        width: 80px;
        height: 80px;
      }
    }

    /* 無障礙：減少動畫 */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <img
      class="brand-image"
      src="brand.jpg"
      alt="好好生醫 — With JOY."
      loading="eager"
    >

    <div class="player-wrap-c">
      <!-- 旋轉外圈 -->
      <div class="vinyl-ring" aria-hidden="true"></div>

      <!-- 主播放鈕 -->
      <button class="player-btn-c" aria-label="播放音樂" type="button">
        <!-- Play Icon -->
        <svg class="icon-play" xmlns="http://www.w3.org/2000/svg"
             width="18" height="18" viewBox="0 0 24 24"
             fill="#1A1A1A" aria-hidden="true">
          <polygon points="5,3 19,12 5,21" />
        </svg>

        <!-- Pause Icon -->
        <svg class="icon-pause" xmlns="http://www.w3.org/2000/svg"
             width="18" height="18" viewBox="0 0 24 24"
             fill="#1A1A1A" aria-hidden="true">
          <rect x="6" y="4" width="4" height="16" rx="1"/>
          <rect x="14" y="4" width="4" height="16" rx="1"/>
        </svg>
      </button>
    </div>
  </div>

  <audio id="audio" src="voice.mp3" preload="auto"></audio>

  <script>
    (function() {
      'use strict';

      const audio = document.getElementById('audio');
      const wrapC = document.querySelector('.player-wrap-c');
      const btnC = document.querySelector('.player-btn-c');

      // togglePlay(classTarget, labelTarget)
      // classTarget: 負責切換 .playing class 的元素（wrapC）
      // labelTarget: 負責設 aria-label 的元素（btnC，必須是 button）
      function togglePlay(classTarget, labelTarget) {
        if (audio.paused) {
          audio.play().catch(function() {
            console.warn('autoplay blocked');
          });
          classTarget.classList.add('playing');
          labelTarget.setAttribute('aria-label', '暫停音樂');
        } else {
          audio.pause();
          classTarget.classList.remove('playing');
          labelTarget.setAttribute('aria-label', '播放音樂');
        }
      }

      if (btnC && wrapC) {
        // 版本 C：classTarget = wrapC（控制 .playing），labelTarget = btnC（button 元素）
        btnC.addEventListener('click', function() {
          togglePlay(wrapC, btnC);
        });
      }

      // 音頻結束時重置
      audio.addEventListener('ended', function() {
        // classTarget = wrapC，labelTarget = btnC
        if (wrapC) wrapC.classList.remove('playing');
        if (btnC) btnC.setAttribute('aria-label', '播放音樂');
      });
    })();
  </script>
</body>
</html>
